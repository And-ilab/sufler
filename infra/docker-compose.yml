name: sufler

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sufler}
      POSTGRES_USER: ${POSTGRES_USER:-sufler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-pgvector.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT_HOST:-9000}:9000"
      - "${MINIO_CONSOLE_PORT_HOST:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      AUTH_MODE: ${AUTH_MODE:-mock_ldap}
      AUTH_MOCK_LDAP_DEFAULT_PASSWORD: ${AUTH_MOCK_LDAP_DEFAULT_PASSWORD:-dev-only-password}
      SUZ_WEBHOOK_HMAC_SECRET: ${SUZ_WEBHOOK_HMAC_SECRET:-}
      AUDIT_ENABLED: ${AUDIT_ENABLED:-true}
      AUDIT_SINKS: ${AUDIT_SINKS:-file}
      AUDIT_FILE_PATH: /var/log/sufler/audit.jsonl
      AUDIT_HTTP_COLLECTOR_URL: ${AUDIT_HTTP_COLLECTOR_URL:-}
      AUDIT_HTTP_TIMEOUT_SECONDS: ${AUDIT_HTTP_TIMEOUT_SECONDS:-5}
      AUDIT_DEVICE_VENDOR: ${AUDIT_DEVICE_VENDOR:-Belarusbank}
      AUDIT_DEVICE_PRODUCT: ${AUDIT_DEVICE_PRODUCT:-AI_Hub}
      POSTGRES_DB: ${POSTGRES_DB:-sufler}
      POSTGRES_USER: ${POSTGRES_USER:-sufler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: http://minio:9000
    command:
      - sh
      - -c
      - python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000
    ports:
      - "${BACKEND_PORT_HOST:-8000}:8000"
    volumes:
      - audit_data:/var/log/sufler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/client-info/', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      AUTH_MODE: ${AUTH_MODE:-mock_ldap}
      AUTH_MOCK_LDAP_DEFAULT_PASSWORD: ${AUTH_MOCK_LDAP_DEFAULT_PASSWORD:-dev-only-password}
      AUDIT_ENABLED: ${AUDIT_ENABLED:-true}
      AUDIT_SINKS: ${AUDIT_SINKS:-file}
      AUDIT_FILE_PATH: /var/log/sufler/audit.jsonl
      AUDIT_HTTP_COLLECTOR_URL: ${AUDIT_HTTP_COLLECTOR_URL:-}
      AUDIT_HTTP_TIMEOUT_SECONDS: ${AUDIT_HTTP_TIMEOUT_SECONDS:-5}
      AUDIT_DEVICE_VENDOR: ${AUDIT_DEVICE_VENDOR:-Belarusbank}
      AUDIT_DEVICE_PRODUCT: ${AUDIT_DEVICE_PRODUCT:-AI_Hub}
      POSTGRES_DB: ${POSTGRES_DB:-sufler}
      POSTGRES_USER: ${POSTGRES_USER:-sufler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: http://minio:9000
    command: celery -A sufler worker --loglevel=info --hostname=worker@%h
    volumes:
      - audit_data:/var/log/sufler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A sufler inspect ping -d worker@$${HOSTNAME} --timeout=10 | grep -q pong",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  audit_data:
